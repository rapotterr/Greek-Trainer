
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Greek Morph Trainer</title>
<style>
body { font-family: Arial; text-align:center; margin-top:40px; }
.word { font-size:40px; margin-bottom:20px; cursor:pointer; }
.box { border:1px solid #333; padding:10px; margin:5px; display:inline-block; min-width:120px; }
.hidden { background:#eee; color:#eee; }
button { padding:10px 20px; margin:10px; }
</style>
</head>
<body>

<h2>Greek Morphology Trainer</h2>

<select id="bookSelect">
<option value="all">All Books</option>
<option value="mt">Matthew</option>
<option value="mk">Mark</option>
<option value="lk">Luke</option>
<option value="jn">John</option>
<option value="ac">Acts</option>
<option value="ro">Romans</option>
<option value="1co">1 Corinthians</option>
<option value="2co">2 Corinthians</option>
<option value="ga">Galatians</option>
<option value="eph">Ephesians</option>
<option value="php">Philippians</option>
<option value="col">Colossians</option>
<option value="1th">1 Thessalonians</option>
<option value="2th">2 Thessalonians</option>
<option value="1ti">1 Timothy</option>
<option value="2ti">2 Timothy</option>
<option value="tit">Titus</option>
<option value="phm">Philemon</option>
<option value="heb">Hebrews</option>
<option value="jas">James</option>
<option value="1pe">1 Peter</option>
<option value="2pe">2 Peter</option>
<option value="1jn">1 John</option>
<option value="2jn">2 John</option>
<option value="3jn">3 John</option>
<option value="jud">Jude</option>
<option value="rev">Revelation</option>
</select>

<select id="posSelect">
<option value="all">All Parts of Speech</option>
<option value="Noun">Noun</option>
<option value="Verb">Verb</option>
<option value="Participle">Participle</option>
<option value="Adjective">Adjective</option>
<option value="Pronoun">Pronoun</option>
</select>

<div class="word" id="wordDisplay"></div>
<div id="info"></div>

<button onclick="newWord()">New Word</button>

<script src="dataset/all.js"></script>
<script src="dataset/mt.js"></script>
<script src="dataset/mk.js"></script>
<script src="dataset/lk.js"></script>
<script src="dataset/jn.js"></script>
<script src="dataset/ac.js"></script>
<script src="dataset/ro.js"></script>
<script src="dataset/1co.js"></script>
<script src="dataset/2co.js"></script>
<script src="dataset/ga.js"></script>
<script src="dataset/eph.js"></script>
<script src="dataset/php.js"></script>
<script src="dataset/col.js"></script>
<script src="dataset/1th.js"></script>
<script src="dataset/2th.js"></script>
<script src="dataset/1ti.js"></script>
<script src="dataset/2ti.js"></script>
<script src="dataset/tit.js"></script>
<script src="dataset/phm.js"></script>
<script src="dataset/heb.js"></script>
<script src="dataset/jas.js"></script>
<script src="dataset/1pe.js"></script>
<script src="dataset/2pe.js"></script>
<script src="dataset/1jn.js"></script>
<script src="dataset/2jn.js"></script>
<script src="dataset/3jn.js"></script>
<script src="dataset/jud.js"></script>
<script src="dataset/rev.js"></script>

<script>

let currentWord = null;

function getDataset(code){
    return DATASETS[code];
}

function newWord(){
    const book = document.getElementById("bookSelect").value;
    const pos = document.getElementById("posSelect").value;

    let data = getDataset(book);

    if(pos !== "all"){
        data = data.filter(w => w.pos === pos);
    }

    currentWord = data[Math.floor(Math.random()*data.length)];

    document.getElementById("wordDisplay").innerText = currentWord.word;

    const infoDiv = document.getElementById("info");
    infoDiv.innerHTML = "";

    for(let key in currentWord){
    if(key === "word") continue;

    let wrapper = document.createElement("div");
    wrapper.style.display = "inline-block";
    wrapper.style.margin = "10px";

    let label = document.createElement("div");
    label.style.fontWeight = "bold";
    label.style.marginBottom = "5px";
    label.innerText = key.charAt(0).toUpperCase() + key.slice(1);

    let box = document.createElement("div");
    box.className = "box hidden";
    box.innerText = currentWord[key];

    box.onclick = function(){
        box.classList.toggle("hidden");
    };

    wrapper.appendChild(label);
    wrapper.appendChild(box);
    infoDiv.appendChild(wrapper);
}
}

newWord();

</script>
</body>
</html>
